<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attox Lab — Live Monitor</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
</head>
<body>
  <header>
    <div class="title">
      <span class="dot-pulse"></span>
      <h1>Attox Lab — Live Instrument Monitor</h1>
    </div>
    <div class="global-controls">
      <button id="clearAllBtn" class="icon-btn">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-7 0v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Clear All
      </button>
      <button id="exportBtn" class="icon-btn">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Export CSV
      </button>
    </div>
  </header>

  <main id="channel-grid"></main>

  <footer id="statusBar">Connecting...</footer>

  <script src="/static/app.js"></script>
</body>
</html>
